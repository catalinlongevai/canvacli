version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: canvacli
    main: ./cmd/canvacli
    binary: canva
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
      - -X main.canvaClientID={{ .Env.CANVA_PROD_CLIENT_ID }}
      - -X main.canvaClientSecret={{ .Env.CANVA_PROD_CLIENT_SECRET }}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

brews:
  - name: canvacli
    repository:
      owner: catancs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/catalinlongevai/canvacli
    description: Agent-first CLI for the Canva Connect API
    license: MIT
    test: |
      system "#{bin}/canva --version"
    install: |
      bin.install "canva"
    skip_upload: auto
